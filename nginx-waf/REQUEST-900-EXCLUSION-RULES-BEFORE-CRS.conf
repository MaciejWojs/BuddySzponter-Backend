SecAction \
  "id:900110, \
   phase:1, \
   nolog, \
   pass, \
   t:none, \
   setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH'"

# Allow raw image upload only on avatar endpoint.
# CRS rule 920420 blocks image/png,image/webp,image/jpeg by default.
SecRule REQUEST_URI "@rx ^/api/v1/users/[0-9]+/avatar$" \
  "id:900120, \
   phase:1, \
   pass, \
   nolog, \
  t:none, \
  setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |application/json| |image/png| |image/webp| |image/jpeg|'"
