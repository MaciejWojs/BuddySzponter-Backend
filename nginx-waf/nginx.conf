more_clear_headers Server;
more_clear_headers Date;

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen      80;
  server_name localhost;

  location = /avatar/{
    return 404;
  } 

  location /avatar {
      proxy_pass http://simple-storage:9000/photos/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # Handle MinIO errors gracefully
      proxy_intercept_errors on;
      error_page 403 = @handle_minio_error;
      error_page 404 = @handle_minio_error;
      error_page 500 = @handle_minio_error;

      # Prevent search engines from indexing the avatar endpoint
      add_header X-Robots-Tag "noindex, nofollow, noarchive";
        
      # disable directory listing
      autoindex off;

      # Browser cache for user avatars 
      add_header Cache-Control "public, max-age=604800, immutable";
  }

  location @handle_minio_error {
      internal;
      default_type application/json;

      # Return a generic error message without exposing internal details
      return 404 '{"error": "Resource not found"}';
  }

  location / {
    proxy_pass              http://app:3000;
    proxy_http_version      1.1;
    proxy_set_header        Host $host;
    proxy_set_header        X-Real-IP $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_pass_request_body on;
    proxy_set_header        Content-Length $content_length;
    proxy_set_header        Content-Type $content_type;

    proxy_set_header        Upgrade $http_upgrade;
    proxy_set_header        Connection $connection_upgrade;
  }
}

server {
  listen      8080;
  server_name health;

  location /health {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    add_header Content-Type text/plain;
    return 200 'OK';
  }

  location /nginx_status {
    stub_status on;
    # allow 127.0.0.1;
    # allow ::1;
    # allow 172.16.0.0/16;
    # deny all;
    access_log off;
  }

  location /stub_status {
    stub_status on;
    access_log off;
  }
}